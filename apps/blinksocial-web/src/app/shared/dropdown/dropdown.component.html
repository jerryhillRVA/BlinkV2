<div class="dropdown-wrapper" [class.dropdown-compact]="size() === 'compact'">
  <button
    class="dropdown-trigger"
    type="button"
    role="combobox"
    aria-controls="dropdown-options"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <span class="dropdown-value">{{ selectedLabel() }}</span>
    <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </button>
  @if (open()) {
    <div class="dropdown-options" id="dropdown-options" role="listbox">
      @for (opt of options(); track opt.value) {
        <button
          class="dropdown-option"
          [class.dropdown-option-active]="opt.value === value()"
          type="button"
          role="option"
          [attr.aria-selected]="opt.value === value()"
          (click)="select(opt.value)"
        >
          <span>{{ opt.label }}</span>
          @if (opt.value === value()) {
            <svg class="dropdown-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          }
        </button>
      }
    </div>
  }
</div>
