<div class="dropdown-wrapper" [class.dropdown-compact]="size() === 'compact'" [class.dropdown-sm]="size() === 'sm'" [class.dropdown-full]="fullWidth()" [class.dropdown-filled]="filled()">
  <button
    class="dropdown-trigger"
    type="button"
    role="combobox"
    aria-controls="dropdown-options"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <span class="dropdown-value" [class.dropdown-value--placeholder]="isPlaceholder()">
      @if (selectedColor()) {
        <span class="dropdown-color-dot" [style.background]="selectedColor()"></span>
      }
      @if (selectedPlatformIcon(); as name) {
        <span class="dropdown-platform-icon" [attr.data-platform]="name">
          <app-platform-icon [platform]="name" [size]="16" />
        </span>
      }
      @if (selectedIconPaths(); as iconPaths) {
        <svg class="dropdown-option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true" [style.color]="selectedIconColor()">
          @for (d of iconPaths; track d) {
            <path [attr.d]="d"></path>
          }
        </svg>
      }
      {{ selectedLabel() }}
    </span>
    <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </button>
  @if (open()) {
    <div class="dropdown-options" id="dropdown-options" role="listbox">
      @for (opt of options(); track opt.value) {
        <button
          class="dropdown-option"
          [class.dropdown-option-active]="opt.value === value()"
          type="button"
          role="option"
          [attr.aria-selected]="opt.value === value()"
          (click)="select(opt.value)"
        >
          <span class="dropdown-option-label">
            @if (opt.color) {
              <span class="dropdown-color-dot" [style.background]="opt.color"></span>
            }
            @if (opt.platformIcon; as name) {
              <span class="dropdown-platform-icon" [attr.data-platform]="name">
                <app-platform-icon [platform]="name" [size]="16" />
              </span>
            }
            @if (opt.iconPaths; as iconPaths) {
              <svg class="dropdown-option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true" [style.color]="opt.iconColor || null">
                @for (d of iconPaths; track d) {
                  <path [attr.d]="d"></path>
                }
              </svg>
            }
            {{ opt.label }}
          </span>
          @if (opt.value === value()) {
            <svg class="dropdown-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          }
        </button>
      }
    </div>
  }
</div>
