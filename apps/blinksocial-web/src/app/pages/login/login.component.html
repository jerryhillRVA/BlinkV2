<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#d94e33" stroke="#d94e33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5"/>
          <rect x="2" y="6" width="14" height="12" rx="2"/>
        </svg>
      </div>
      <h1 class="brand-text">BLINK</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    @if (needsBootstrap()) {
      <div class="bootstrap-hint">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
        <div>
          <strong>First time setup</strong>
          <p>Use the default admin credentials:<br>
            <code>blinkadmin&#64;blinksocial.com</code> / <code>blinksocial</code></p>
        </div>
      </div>
    }

    @if (error()) {
      <div class="error-message">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" x2="9" y1="9" y2="15"/>
          <line x1="9" x2="15" y1="9" y2="15"/>
        </svg>
        <span>{{ error() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          [disabled]="loading()"
        />
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          [disabled]="loading()"
        />
      </div>
      <button
        type="submit"
        class="login-btn"
        [disabled]="loading()"
      >
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
