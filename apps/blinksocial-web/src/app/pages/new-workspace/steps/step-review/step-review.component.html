<div class="step-review">
  <div class="review-checkmark">
    <div class="checkmark-pulse"></div>
    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <path d="m9 11 3 3L22 4"/>
    </svg>
  </div>

  <h2 class="review-heading">All Set!</h2>
  <p class="review-description">
    Your Blink Social workspace has been configured and is ready to launch.
  </p>

  <div class="review-summary">
    <h4 class="summary-title">Summary</h4>
    <div class="summary-row">
      <span class="summary-label">Workspace:</span>
      <span class="summary-value">{{ workspaceName }}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Content Pillars:</span>
      <span class="summary-value">{{ pillarCount }} Active</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Platforms:</span>
      <span class="summary-value">{{ enabledPlatformNames }}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Business Objectives:</span>
      <span class="summary-value">{{ objectiveCount }}</span>
    </div>
  </div>

  <p class="review-ready">Ready to launch?</p>
</div>
