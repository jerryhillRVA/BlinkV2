<div class="new-workspace">
  <div class="wizard-bg" aria-hidden="true">
    <img src="dashboard-bg.jpg" alt="" />
  </div>

  <button class="back-home" (click)="goHome()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="7" height="7" x="3" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="14" rx="1"/>
      <rect width="7" height="7" x="3" y="14" rx="1"/>
    </svg>
    Back to Home
  </button>

  <header class="page-header">
    <div class="page-header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <h1 class="page-title">Setup Your Workspace</h1>
    <p class="page-subtitle">Follow the steps below to initialize your Blink Social workspace.</p>
  </header>

  <app-step-indicator [steps]="STEPS" [currentStep]="currentStep()" />

  <div class="wizard-card">
    <div class="wizard-content">
      @switch (currentStep()) {
        @case (1) { <app-step-workspace-basics /> }
        @case (2) { <app-step-objectives /> }
        @case (3) { <app-step-brand-positioning /> }
        @case (4) { <app-step-audience /> }
        @case (5) { <app-step-platform-config /> }
        @case (6) { <app-step-content-strategy /> }
        @case (7) { <app-step-review /> }
      }
    </div>

    <div class="wizard-footer">
      <button
        class="wizard-back"
        [disabled]="isFirstStep"
        (click)="onBack()"
      >
        Back
      </button>
      <button
        class="wizard-next"
        [disabled]="isSubmitting()"
        (click)="onNext()"
      >
        @if (isSubmitting()) {
          Submitting...
        } @else if (isLastStep) {
          Finish
        } @else {
          Next
        }
      </button>
    </div>
  </div>
</div>
