<section class="card">
  <div class="card-header">
    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
      <path d="M7.8 16.2a5 5 0 0 1 0-8.4"/>
      <path d="M16.2 7.8a5 5 0 0 1 0 8.4"/>
      <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
      <circle cx="12" cy="12" r="1"/>
    </svg>
    <h3 class="card-title">Platform Tone Adjustments</h3>
  </div>
  <p class="card-description">Tailor your tone for each platform's unique audience and format.</p>

  <div class="platform-grid">
    @for (entry of adjustments(); track entry.platform) {
      <div class="platform-card">
        <div class="platform-header">
          <span class="platform-label">{{ platformLabels[entry.platform] }}</span>
          <button
            class="btn btn-ai btn-sm"
            (click)="suggestTone(entry.platform)"
            [disabled]="suggestingPlatform() === entry.platform"
          >
            @if (suggestingPlatform() === entry.platform) {
              <span class="spinner"></span>
            }
            {{ suggestingPlatform() === entry.platform ? 'Suggesting...' : 'AI Suggest' }}
          </button>
        </div>
        <textarea
          class="platform-textarea"
          [placeholder]="'How should the tone adapt for ' + platformLabels[entry.platform] + '?'"
          [ngModel]="entry.adjustment"
          (ngModelChange)="updateAdjustment(entry.platform, $event)"
          rows="3"
        ></textarea>
      </div>
    }
  </div>
</section>
