<section class="bv-section">
  <header class="bv-section-header">
    <div>
      <p class="bv-section-label has-mock-data" title="Mock data">Content Mission Statement</p>
      <p class="bv-section-subtitle">Complete this sentence: We create content to help [audience] [achieve outcome] by [our approach].</p>
    </div>
    <button
      class="btn btn-ai btn-sm"
      (click)="draftMission()"
      [disabled]="isDrafting()"
    >
      @if (!isDrafting()) {
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
          <path d="M20 3v4"/>
          <path d="M22 5h-4"/>
          <path d="M4 17v2"/>
          <path d="M5 18H3"/>
        </svg>
      }
      @if (isDrafting()) {
        <span class="spinner"></span>
      }
      {{ isDrafting() ? 'Drafting...' : 'Draft Mission' }}
    </button>
  </header>
  <textarea
    class="mission-textarea"
    placeholder="Enter your brand's mission statement..."
    [ngModel]="missionStatement()"
    (ngModelChange)="updateMission($event)"
    rows="4"
  ></textarea>
  <div class="card-actions">
    <button
      class="btn btn-primary btn-sm"
      (click)="saveMission()"
      [disabled]="!missionStatement().trim()"
    >
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
      Save Mission
    </button>
  </div>
</section>
