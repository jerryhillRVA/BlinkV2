<section class="card">
  <div class="card-header">
    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    <h3 class="card-title">Vocabulary Guide</h3>
  </div>
  <p class="card-description">Curate preferred and avoided terms to keep messaging consistent.</p>

  <div class="vocab-columns">
    <div class="vocab-column preferred-column">
      <h4 class="vocab-heading preferred-heading">Preferred Terms</h4>
      <div class="chip-list">
        @for (word of vocabulary().preferred; track word) {
          <span class="chip chip-preferred">
            {{ word }}
            <button class="chip-remove" (click)="removePreferredWord(word)" title="Remove">&times;</button>
          </span>
        }
      </div>
      <div class="vocab-input-row">
        <input
          class="form-input"
          placeholder="Add preferred term..."
          [ngModel]="newPreferredWord()"
          (ngModelChange)="newPreferredWord.set($event)"
          (keyup.enter)="addPreferredWord()"
        />
        <button class="btn btn-secondary btn-sm" (click)="addPreferredWord()">Add</button>
      </div>
    </div>

    <div class="vocab-column avoid-column">
      <h4 class="vocab-heading avoid-heading">Terms to Avoid</h4>
      <div class="chip-list">
        @for (word of vocabulary().avoid; track word) {
          <span class="chip chip-avoid">
            {{ word }}
            <button class="chip-remove" (click)="removeAvoidWord(word)" title="Remove">&times;</button>
          </span>
        }
      </div>
      <div class="vocab-input-row">
        <input
          class="form-input"
          placeholder="Add term to avoid..."
          [ngModel]="newAvoidWord()"
          (ngModelChange)="newAvoidWord.set($event)"
          (keyup.enter)="addAvoidWord()"
        />
        <button class="btn btn-secondary btn-sm" (click)="addAvoidWord()">Add</button>
      </div>
    </div>
  </div>

  <div class="card-actions">
    <button class="btn btn-ai" (click)="generateVocabulary()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      </svg>
      AI Generate Vocabulary
    </button>
  </div>
</section>
