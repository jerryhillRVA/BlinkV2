<div class="in-progress-card" role="button" tabindex="0" (click)="onResume()" (keydown.enter)="onResume()">
  <div class="accent-bar" [class]="statusClass"></div>
  <div class="card-body">
    <span class="status-badge" [class]="statusClass">{{ statusLabel }}</span>
    <h3 class="workspace-name">{{ workspace().name }}</h3>
    <button class="resume-btn" (click)="onResume(); $event.stopPropagation()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
      Resume
    </button>
  </div>
</div>
