<div class="dashboard">
  <div class="dashboard-bg" aria-hidden="true">
    <img src="dashboard-bg.jpg" alt="" />
  </div>
  <header class="dashboard-header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="7" height="7" x="3" y="3" rx="1"/>
        <rect width="7" height="7" x="14" y="3" rx="1"/>
        <rect width="7" height="7" x="14" y="14" rx="1"/>
        <rect width="7" height="7" x="3" y="14" rx="1"/>
      </svg>
    </div>
    <h1>Welcome to Blink Social</h1>
    <p class="subtitle">
      Your command center for multi-platform content strategy and AI-driven growth.
    </p>
  </header>

  @if (inProgressWorkspaces().length > 0) {
    <div class="in-progress-section">
      <h2 class="section-title">In Progress</h2>
      <div class="in-progress-grid">
        @for (workspace of inProgressWorkspaces(); track workspace.id) {
          <app-in-progress-card [workspace]="workspace" />
        }
      </div>
    </div>
  }

  <div class="workspace-grid">
    <button class="card card-new" (click)="onCreateWorkspace()">
      <div class="new-content">
        <div class="plus-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="plus-icon">
            <path d="M5 12h14"/>
            <path d="M12 5v14"/>
          </svg>
        </div>
        <span class="new-label">New Workspace</span>
        <span class="new-description">Initialize a new content strategy and AI team.</span>
      </div>
    </button>

    <button class="card card-new card-onboard"
            [class.card-disabled]="!canOnboard()"
            [disabled]="!canOnboard()"
            [attr.title]="canOnboard() ? null : 'Admin access required'"
            (click)="onOnboardWorkspace()">
      <div class="new-content">
        <div class="plus-circle onboard-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="plus-icon">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>
          </svg>
        </div>
        <span class="new-label">Onboard New Workspace</span>
        <span class="new-description">AI-guided discovery for your content strategy.</span>
      </div>
    </button>

    @for (workspace of activeWorkspaces(); track workspace.name) {
      <app-workspace-card [workspace]="workspace" (goToWorkspace)="onGoToWorkspace($event)" />
    }
  </div>
</div>
