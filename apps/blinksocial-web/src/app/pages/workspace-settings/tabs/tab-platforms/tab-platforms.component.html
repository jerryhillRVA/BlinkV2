@if (settings) {
  <!-- Global Settings Card -->
  <div class="tab-card">
    <div class="card-header card-header-bordered">
      <h4 class="card-title">Global Settings</h4>
    </div>
    <div class="card-content">
      <div class="field-grid">
        <div class="field-group">
          <label class="field-label" for="default-platform">
            Default Platform
            <app-tooltip text="The platform used as default when creating new content." />
          </label>
          <app-dropdown
            [options]="platformDropdownOptions"
            [value]="settings.globalRules.defaultPlatform"
            (valueChange)="updateDefaultPlatform($event)"
          />
        </div>
        <div class="field-group">
          <label class="field-label" for="max-ideas">
            Max Ideas Per Platform/Month
            <app-tooltip text="Maximum number of content ideas generated per platform each month." />
          </label>
          <input
            class="field-input"
            id="max-ideas"
            type="number"
            [value]="settings.globalRules.maxIdeasPerMonth"
            (input)="updateMaxIdeas($any($event.target).value)"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Platforms Card -->
  <div class="tab-card">
    <div class="card-header">
      <h4 class="card-title">Platforms</h4>
    </div>
    <div class="card-content card-content-compact">
      <div class="platform-list">
        @for (pid of platformOptions; track pid) {
          <div class="platform-row" [class.platform-disabled]="!isPlatformEnabled(pid)">
            <div class="platform-info">
              <div class="platform-icon" [class.platform-icon-active]="isPlatformEnabled(pid)">
                <app-platform-icon [platform]="pid" [size]="16" />
              </div>
              <span class="platform-name" [class.platform-name-muted]="!isPlatformEnabled(pid)">{{ displayName(pid) }}</span>
              <span class="platform-badge" [class.platform-badge-active]="isPlatformEnabled(pid)">
                {{ isPlatformEnabled(pid) ? 'Active' : 'Disabled' }}
              </span>
            </div>
            <button
              class="platform-toggle"
              type="button"
              role="switch"
              [attr.aria-checked]="isPlatformEnabled(pid)"
              [class.platform-toggle-on]="isPlatformEnabled(pid)"
              (click)="togglePlatform(pid)"
            >
              <span class="platform-toggle-thumb" [class.platform-toggle-thumb-on]="isPlatformEnabled(pid)"></span>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
}
