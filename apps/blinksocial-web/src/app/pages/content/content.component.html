<div class="content-page">
  <div class="content-bg" aria-hidden="true">
    <img src="dashboard-bg.jpg" alt="" />
  </div>

  <main class="content-main" [class.content-entering]="!transitioning()">
    @if (transitioning() || stateService.loading()) {
      <div class="loading-state">
        <p>Loading content...</p>
      </div>
    } @else {
      @switch (activeView()) {
        @case ('overview') {
          <app-pipeline-view
            [items]="stateService.items()"
            [pillars]="stateService.pillars()"
            (navigateToStep)="setActiveView($event)"
            (createItem)="openCreate()"
            (createItemAs)="openCreate($event)"
          />
        }
        @case ('strategy') {
          <app-strategy-stub />
        }
        @case ('production') {
          <app-production-stub />
        }
        @case ('review') {
          <app-review-stub />
        }
        @case ('performance') {
          <app-performance-stub />
        }
      }
    }
  </main>

  @if (showCreate()) {
    <app-content-create-modal
      [pillars]="stateService.pillars()"
      [segments]="stateService.segments()"
      [initialType]="createInitialType()"
      (saveContent)="onCreateSave($event)"
      (saveMany)="onCreateSaveMany($event)"
      (moveToProduction)="onMoveToProduction($event)"
      (draftAssets)="onDraftAssets($event)"
      (createConcept)="onCreateConcept($event)"
      (cancelCreate)="closeCreate()"
    />
  }
</div>
