@if (store.item(); as item) {
  <div class="post-detail">
    <app-post-detail-header
      [item]="item"
      [briefApproved]="!!item.briefApproved"
      (titleChange)="onTitleChange($event)"
      (backToConcept)="onBackToConcept()"
      (archive)="onArchive()"
      (unarchive)="onUnarchive()"
      (duplicate)="onDuplicate()"
      (deletePost)="onDelete()"
    >
      <app-detail-back-button [ariaLabel]="backLabel" (back)="onBack()" />
    </app-post-detail-header>

    <app-variation-chips
      [items]="siblings()"
      [activeId]="item.id"
      (open)="onOpenSibling($event)"
    />

    <app-production-steps-bar
      [activeStep]="store.activeStep()"
      [briefApproved]="!!item.briefApproved"
      (stepChange)="store.setActiveStep($event)"
    />

    <div class="post-body">
      @switch (store.activeStep()) {
        @case ('brief') {
          <div class="brief-grid">
            <div class="brief-main">
              <app-brief-step />
            </div>
            <aside class="brief-side">
              <app-brief-content-concept
                [concept]="parentConcept()"
                [pillars]="store.pillars()"
                [segments]="store.segments()"
                [objectives]="businessObjectives()"
                (editConcept)="onBackToConcept()"
              />

              <section class="panel panel-journey side-card">
                <h3 class="side-card-title">Content Journey</h3>
                <app-content-journey [stage]="item.stage" />
              </section>

              <section class="panel timestamps-panel side-card">
                <div class="timestamp-row">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                  <div class="timestamp-content">
                    <span class="timestamp-label">Created</span>
                    <span class="timestamp-value">{{ formatDate(item.createdAt) }}</span>
                  </div>
                </div>
                <div class="timestamp-row">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                  <div class="timestamp-content">
                    <span class="timestamp-label">Last Updated</span>
                    <span class="timestamp-value">{{ formatDate(item.updatedAt) }}</span>
                  </div>
                </div>
              </section>
            </aside>
          </div>
        }
        @case ('builder') {
          <app-step-placeholder label="Builder" />
        }
        @case ('packaging') {
          <app-step-placeholder label="Packaging" />
        }
        @case ('qa') {
          <app-step-placeholder label="QA" />
        }
        @case ('handoff') {
          <app-step-placeholder label="Handoff" />
        }
      }
    </div>
  </div>
}
