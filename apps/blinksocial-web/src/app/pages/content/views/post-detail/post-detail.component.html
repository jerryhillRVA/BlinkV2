@if (store.item(); as item) {
  <div class="post-detail">
    <app-post-detail-header
      [item]="item"
      [briefApproved]="!!item.briefApproved"
      (titleChange)="onTitleChange($event)"
      (backToConcept)="onBackToConcept()"
      (archive)="onArchive()"
      (unarchive)="onUnarchive()"
      (duplicate)="onDuplicate()"
      (deletePost)="onDelete()"
    >
      <app-detail-back-button [ariaLabel]="backLabel" (back)="onBack()" />
    </app-post-detail-header>

    <div class="status-stepper-wrap">
      <app-status-stepper
        [value]="item.status"
        [stage]="item.stage"
        (statusChange)="onStatusChange($event)"
      />
    </div>

    <app-production-steps-bar
      [activeStep]="store.activeStep()"
      [briefApproved]="!!item.briefApproved"
      (stepChange)="store.setActiveStep($event)"
    />

    <div class="post-body">
      @switch (store.activeStep()) {
        @case ('brief') {
          <div class="brief-grid">
            <div class="brief-main">
              <app-brief-step />
            </div>
            <aside class="brief-side">
              <app-brief-status-sidebar
                [approved]="!!item.briefApproved"
                [approvedAt]="item.briefApprovedAt"
                [approvedBy]="item.briefApprovedBy"
                [requiredDone]="store.requiredFieldsDone()"
                [requiredTotal]="store.requiredFieldsTotal"
                [errors]="store.errors()"
                [warnings]="store.warnings()"
                [canApprove]="store.canApprove()"
                (approve)="onApprove()"
                (unlock)="onUnlock()"
                (continueToBuilder)="onContinueToBuilder()"
              />
            </aside>
          </div>
        }
        @case ('builder') {
          <app-step-placeholder label="Builder" />
        }
        @case ('packaging') {
          <app-step-placeholder label="Packaging" />
        }
        @case ('qa') {
          <app-step-placeholder label="QA" />
        }
      }
    </div>
  </div>
}
