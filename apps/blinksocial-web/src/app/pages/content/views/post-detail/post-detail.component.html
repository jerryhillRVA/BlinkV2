@if (store.item(); as item) {
  <div class="post-detail">
    <app-post-detail-header
      [item]="item"
      [briefApproved]="!!item.briefApproved"
      (titleChange)="onTitleChange($event)"
      (backToConcept)="onBackToConcept()"
      (archive)="onArchive()"
      (unarchive)="onUnarchive()"
      (duplicate)="onDuplicate()"
      (deletePost)="onDelete()"
    >
      <app-detail-back-button [ariaLabel]="backLabel" (back)="onBack()" />
    </app-post-detail-header>

    <app-variation-chips
      [items]="siblings()"
      [activeId]="item.id"
      (open)="onOpenSibling($event)"
    />

    <app-production-steps-bar
      [activeStep]="store.activeStep()"
      [briefApproved]="!!item.briefApproved"
      (stepChange)="store.setActiveStep($event)"
    />

    <div class="post-body">
      @switch (store.activeStep()) {
        @case ('brief') {
          <div class="brief-grid">
            <div class="brief-main">
              <app-brief-step />
            </div>
            <aside class="brief-side">
              <app-brief-content-concept
                [concept]="parentConcept()"
                [pillars]="store.pillars()"
                [segments]="store.segments()"
                (editConcept)="onBackToConcept()"
              />
            </aside>
          </div>
        }
        @case ('builder') {
          <app-step-placeholder label="Builder" />
        }
        @case ('packaging') {
          <app-step-placeholder label="Packaging" />
        }
        @case ('qa') {
          <app-step-placeholder label="QA" />
        }
        @case ('handoff') {
          <app-step-placeholder label="Handoff" />
        }
      }
    </div>
  </div>
}
