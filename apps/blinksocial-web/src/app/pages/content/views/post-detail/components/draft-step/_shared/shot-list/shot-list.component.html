<div class="shot-list">
  <div class="shot-list-header">
    <h4 class="shot-list-title">Shot list</h4>
    <span
      class="shot-count"
      role="status"
      aria-live="polite"
      [attr.data-count]="shots.length"
    >{{ countLabel }}</span>
  </div>

  <ul class="shot-rows" role="list">
    @for (shot of shots; track shot.id; let i = $index) {
      <li class="shot-row">
        <span class="shot-index" aria-hidden="true">{{ i + 1 }}</span>

        <select
          class="shot-type"
          [disabled]="disabled"
          [attr.aria-label]="'Shot ' + (i + 1) + ' type'"
          (change)="onTypeChange(shot.id, $event)"
        >
          @for (t of shotTypes; track t) {
            <option [value]="t" [selected]="t === shot.type">{{ t }}</option>
          }
        </select>

        <input
          type="text"
          class="shot-description"
          placeholder="Describe the shot…"
          [disabled]="disabled"
          [attr.aria-label]="'Shot ' + (i + 1) + ' description'"
          [value]="shot.description"
          (input)="onDescriptionChange(shot.id, $event)"
        />

        <input
          type="text"
          class="shot-duration"
          placeholder="Duration"
          [disabled]="disabled"
          [attr.aria-label]="'Shot ' + (i + 1) + ' duration'"
          [value]="shot.duration"
          (input)="onDurationChange(shot.id, $event)"
        />

        <div class="shot-actions">
          <button
            type="button"
            class="action-btn"
            [disabled]="disabled || i === 0"
            [attr.aria-label]="'Move shot ' + (i + 1) + ' up'"
            (click)="onMoveUp(i)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m18 15-6-6-6 6" />
            </svg>
          </button>
          <button
            type="button"
            class="action-btn"
            [disabled]="disabled || i === shots.length - 1"
            [attr.aria-label]="'Move shot ' + (i + 1) + ' down'"
            (click)="onMoveDown(i)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
          <button
            type="button"
            class="action-btn action-btn--remove"
            [disabled]="disabled"
            [attr.aria-label]="'Remove shot ' + (i + 1)"
            (click)="onRemove(shot.id)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 6h18" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>
      </li>
    }
  </ul>

  <button
    type="button"
    class="add-shot-btn"
    [disabled]="disabled"
    (click)="onAddShot()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="M12 5v14" />
      <path d="M5 12h14" />
    </svg>
    <span>Add shot</span>
  </button>
</div>
