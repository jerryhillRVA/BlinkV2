<div class="progress-bar">
  @for (section of sections(); track section.id; let last = $last) {
    <div class="progress-step"
         [class.covered]="section.covered"
         [class.active]="section.id === currentSection() && !section.covered">
      <div class="step-dot">
        @if (section.covered) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        }
      </div>
      <span class="step-label">{{ section.name }}</span>
    </div>

    @if (!last) {
      <div
        class="step-line"
        [class.step-line-filled]="section.covered"
      ></div>
    }
  }
</div>
