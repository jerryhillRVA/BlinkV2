<div class="blueprint-preview">
  <div class="preview-header">
    <div class="preview-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
        <path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>
      </svg>
      <h3>Your Blink Blueprint</h3>
    </div>
    <div class="preview-actions">
      <button class="download-btn" (click)="onDownload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>
        </svg>
        Download Markdown
      </button>
      <button class="create-workspace-btn" (click)="onCreateWorkspace()" [disabled]="isCreating()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M12 5v14"/>
        </svg>
        @if (isCreating()) {
          Creating...
        } @else {
          Create Workspace from Blueprint
        }
      </button>
    </div>
  </div>
  <div class="preview-content">
    <div class="markdown-rendered" [innerHTML]="renderedHtml()"></div>
  </div>
</div>
